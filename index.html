<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sigit'anjing - Laptop Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #ff69b4, #ffb6c1);
            color: white; text-align: center; margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
            transition: all 1s ease;
        }
        
        body.countdown-active { background: radial-gradient(circle, #2c0221 0%, #000000 100%); }
        body.final-active {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1518591276717-33e75e89b258?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
        }

        .photo-moments { display: flex; gap: 20px; margin: 25px 0; justify-content: center; }
        .photo-moments img {
            width: 120px; height: 120px; object-fit: cover;
            border-radius: 50%; border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .heart-drop { position: absolute; color: #ff4757; font-size: 25px; top: -30px; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        
        .cat-container { position: absolute; bottom: 30px; width: 100%; height: 80px; display: none; overflow: hidden; z-index: 5; }
        .cats { font-size: 55px; position: absolute; white-space: nowrap; animation: run 6s linear infinite; }
        @keyframes run { from { left: -200px; } to { left: 100%; } }

        #mainContent {
            display: none; flex-direction: column; align-items: center;
            width: 85%; max-width: 450px; max-height: 90vh; padding: 30px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px);
            border-radius: 30px; border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); z-index: 10; overflow-y: auto;
        }

        .video-container { 
            width: 100%; max-width: 280px; aspect-ratio: 9 / 16; 
            border-radius: 20px; overflow: hidden; margin: 15px 0; 
            border: 4px solid white; background: #000; 
        }

        .option-text { 
            cursor: pointer; font-size: 1.3em; margin: 10px; padding: 15px; 
            background: rgba(255,255,255,0.2); border-radius: 15px; 
            border: 2px solid white; width: 300px; transition: 0.3s;
        }
        .option-text:hover { background: white; color: #ff69b4; transform: scale(1.05); }

        #smallOption { 
            position: fixed; bottom: 20px; right: 20px; 
            background: rgba(255,255,255,0.4); font-size: 0.8em; 
            padding: 8px 15px; border-radius: 10px; cursor: pointer; display: none; 
        }

        button { padding:12px 25px; background:#ff4757; color:#fff; border:none; border-radius:25px; margin:10px; font-weight: bold; cursor: pointer;}
        #countdown { font-size: 10em; font-weight: bold; display: none; }

        .mobile-blocker {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: #ff69b4; color: white; padding: 30px; 
            text-align: center; font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>

    <audio id="dangerSound">
        <source src="https://www.myinstants.com/media/sounds/wrong-answer-buzzer.mp3" type="audio/mpeg">
    </audio>

    <div id="catLayer" class="cat-container">
        <div class="cats">🐈‍⬛ 🐈 💨 🐈‍⬛ 🐈 💨</div>
    </div>

    <div id="optionScreen">
        <h1 style="font-family: 'Dancing Script', cursive; font-size: 2.5em;">karena pacar aku banyak jadi aku bikin opsi hehehheh</h1>
        <p>coba pilih kamu pacar aku yang mana:</p>
        <center>
            <div class="option-text" onclick="selectOption('Raihana')">Raihana</div>
            <div class="option-text" onclick="selectOption('Nasywa')">Nasywa</div>
            <div class="option-text" onclick="selectOption('Pauziah')">Pauziah</div>
        </center>
    </div>
    
    <div id="photoScreen" style="display: none; flex-direction: column; align-items: center;">
        <h1 style="font-size: 1.8em;">Momen paling seru bareng aku?</h1>
        <div class="photo-moments">
            <img src="hindia.jpg" onerror="this.src='https://via.placeholder.com/150?text=Hindia'">
            <img src="konser first.jpg" onerror="this.src='https://via.placeholder.com/150?text=Konser'">
            <img src="avatar date.jpg" onerror="this.src='https://via.placeholder.com/150?text=Avatar'">
        </div>
        <div class="options">
            <button onclick="chooseOption()">Tahun baru bareng</button>
            <button onclick="chooseOption()">First time konser</button>
            <button onclick="chooseOption()">Avatar date</button>
        </div>
        <div id="smallOption" onclick="startCountdown()">SEMUA</div>
    </div>
    
    <div id="countdown">3</div>
    
    <div id="mainContent">
        <h1 class="final-title" style="font-family: 'Dancing Script', cursive; font-size: 2em;">Happy Valentine, <span id="displayName"></span> sayangg!</h1>
        <p id="customMessage" style="font-style: italic;"></p>
        
        <div class="video-container">
            <video id="myVideo" width="100%" loop playsinline muted autoplay>
                <source src="HANA.mp4" type="video/mp4">
            </video>
        </div>
        <p style="font-size: 0.8em; margin-top: 10px; font-weight: bold;">I LOVE YOU REIHANA NASYWA PAUZIAH ✨</p>
        <button onclick="playUlang()" style="font-size: 0.8em; background: rgba(0,0,0,0.5);">Putar Ulang Video</button>
    </div>

    <script>
        // CEK DEVICE (LAPTOP ONLY)
        function checkDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isSmallScreen = window.innerWidth < 1024;
            if (isMobile || isSmallScreen) {
                document.body.innerHTML = `<div class="mobile-blocker"><h1>🚫 Opsss!</h1><p>Maaf sayang, web Valentine ini <b>KHUSUS</b> dibuka di Laptop atau Komputer yaa.</p></div>`;
            }
        }
        checkDevice();

        let selectedName = '';

        function selectOption(name) {
            selectedName = name;
            document.getElementById('optionScreen').style.display = 'none';
            document.getElementById('photoScreen').style.display = 'flex';
            document.getElementById('smallOption').style.display = 'block';
        }
        
        function chooseOption() {
            // Memainkan suara Danger
            const sound = document.getElementById('dangerSound');
            sound.currentTime = 0; // Reset ke awal biar bisa bunyi berkali-kali
            sound.play();

            Swal.fire({ 
                title: 'DIH CUMA SATUUUUU! 🚨', 
                text: 'ADA OPSI LAIN PADAHAL, CARI PAKE INSTING PLISS! 😤', 
                icon: 'error', 
                confirmButtonText: 'iya oke aku cari lagi', 
                confirmButtonColor: '#ff4757' 
            });
        }
        
        function startCountdown() {
            document.getElementById('photoScreen').style.display = 'none';
            document.getElementById('smallOption').style.display = 'none';
            const countdownEl = document.getElementById('countdown');
            countdownEl.style.display = 'block';
            document.body.classList.add('countdown-active');
            let count = 3;
            const interval = setInterval(() => {
                count--;
                if (count > 0) countdownEl.textContent = count;
                else if (count === 0) countdownEl.textContent = "LOVE";
                else { clearInterval(interval); showFinalScreen(); }
            }, 1000);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-drop');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function playUlang() {
            const vid = document.getElementById('myVideo');
            vid.currentTime = 0;
            vid.muted = false;
            vid.play();
        }

        function showFinalScreen() {
            document.getElementById('countdown').style.display = 'none';
            document.body.classList.remove('countdown-active');
            document.body.classList.add('final-active');
            document.getElementById('catLayer').style.display = 'block';
            setInterval(createHeart, 250);

            document.getElementById('displayName').textContent = selectedName;
            const msg = document.getElementById('customMessage');
            if (selectedName === 'Raihana') msg.innerHTML = '"yeyyyy kamu sayanggg akuuuu muahccc 💕"';
            else if (selectedName === 'Nasywa') msg.innerHTML = '"love youu sayang loveyouu cintakuuu 💕"';
            else if (selectedName === 'Pauziah') msg.innerHTML = '"kamu tuh dopamine ya bukan orang... 💕"';
            
            document.getElementById('mainContent').style.display = 'flex';
            const vid = document.getElementById('myVideo');
            vid.play().catch(e => console.log("Autoplay blocked"));
            vid.onclick = function() { vid.muted = false; vid.play(); };
        }
    </script>
</body>
</html>
